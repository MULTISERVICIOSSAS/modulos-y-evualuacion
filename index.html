        }
        .certificate-border {

            margin: 5px;
            height: calc(100% - 10px);
        }

            body * {
                visibility: hidden;
            }
            #certificate, #certificate * {
                visibility: visible;
            }

                left: 0;
                top: 0;

            const sourceBadge = module.youtubeId

                : '<span class="inline-flex items-center bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full ml-3"><i class="fas fa-file-video mr-1"></i> Video Local</span>';
            
            const div = document.createElement('div');
            div.className = 'fade-in';
            div.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center flex-wrap">
                        <span class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center mr-3 text-lg shadow-md flex-shrink-0">${state.currentModuleIndex + 1}</span>
                        ${module.title}
                        ${sourceBadge}
                    </h2>
                    <span class="bg-blue-100 text-blue-800 text-sm font-bold px-4 py-2 rounded-full flex-shrink-0">
                        Módulo ${state.currentModuleIndex + 1} de ${courseData.modules.length}
                    </span>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-lg mb-6 border-t-4 border-blue-600">
                    <!-- Video Container -->
                    <div class="mb-4">
                        ${videoHTML}
                    </div>
                    
                    <div class="prose max-w-none">
                        <p class="text-gray-700 mb-4 font-medium text-lg leading-relaxed">${module.description}</p>
                    </div>
                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mt-6 rounded-r">
                        <p class="text-sm text-yellow-800 flex items-center">
                            <i class="fas fa-lightbulb text-yellow-500 text-xl mr-3"></i>
                            <span>Presta atención al video, tendrás que responder una pregunta clave para avanzar al siguiente tema.</span>
                        </p>
                    </div>
                </div>
                <div class="text-right">
                    <button onclick="goToQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition duration-200 flex items-center ml-auto">
                        <span>Responder Pregunta</span>
                        <i class="fas fa-question-circle ml-2"></i>
                    </button>
                </div>
            `;
            app.appendChild(div);
        }

        function renderModuleQuiz() {
            const module = courseData.modules[state.currentModuleIndex];
            const div = document.createElement('div');
            div.className = 'fade-in bg-white p-8 rounded-xl shadow-md max-w-3xl mx-auto border-t-4 border-blue-600';
            
            let optionsHtml = '';
            module.quiz.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button onclick="checkModuleAnswer(${idx})" class="w-full text-left p-5 border border-gray-200 rounded-xl mb-4 hover:bg-blue-50 hover:border-blue-400 transition duration-200 group shadow-sm relative overflow-hidden">
                        <div class="flex items-center">
                            <span class="flex-shrink-0 w-10 h-10 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center mr-4 group-hover:bg-blue-600 group-hover:text-white font-bold transition-colors">${String.fromCharCode(65+idx)}</span>
                            <span class="text-lg text-gray-700 font-medium group-hover:text-blue-900">${opt}</span>
                        </div>
                    </button>
                `;
            });

            div.innerHTML = `
                <div class="text-center mb-8">
                    <span class="text-blue-600 font-bold tracking-wider uppercase text-sm">Evaluación del Módulo</span>
                    <h2 class="text-2xl font-bold text-gray-800 mt-2">Pregunta de Repaso</h2>
                </div>
                
                <p class="text-xl text-gray-800 mb-8 font-medium text-center">${module.quiz.question}</p>
                
                <div class="space-y-2">
                    ${optionsHtml}
                </div>
                
                <div id="feedback" class="mt-6 hidden animate-fade-in-up"></div>
            `;
            app.appendChild(div);
        }

        function renderExamIntro() {
            const div = document.createElement('div');
            div.className = 'fade-in bg-white p-10 rounded-xl shadow-lg text-center max-w-2xl mx-auto border-t-4 border-purple-600';
            div.innerHTML = `
                <div class="mb-6 inline-block p-6 rounded-full bg-purple-50">
                    <i class="fas fa-clipboard-list text-6xl text-purple-600"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-4">Examen Final</h2>
                <p class="text-gray-600 mb-8 text-lg leading-relaxed">
                    ¡Felicidades! Has completado los 27 módulos de aprendizaje. 
                    Ahora deberás aprobar el examen final para obtener tu certificado oficial de Multiservicios.
                </p>
                <div class="bg-gray-50 p-6 rounded-xl text-left mb-8 text-gray-700 border border-gray-200 shadow-inner">
                    <h3 class="font-bold mb-3 text-purple-800 flex items-center"><i class="fas fa-info-circle mr-2"></i> Detalles del Examen:</h3>
                    <ul class="space-y-3">
                        <li class="flex items-center"><i class="fas fa-check text-green-500 mr-3"></i> Total de preguntas: <strong>${courseData.finalExam.length}</strong></li>
                        <li class="flex items-center"><i class="fas fa-check text-green-500 mr-3"></i> Nota mínima: <strong>70% (14 correctas)</strong></li>
                        <li class="flex items-center"><i class="fas fa-check text-green-500 mr-3"></i> Intentos ilimitados</li>
                    </ul>
                </div>
                <button onclick="startExam()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition transform hover:scale-105 flex items-center mx-auto text-lg">
                    <span>Comenzar Examen</span>
                    <i class="fas fa-arrow-right ml-3"></i>
                </button>
            `;
            app.appendChild(div);
        }

        function renderExam() {
            const div = document.createElement('div');
            div.className = 'fade-in max-w-4xl mx-auto';
            
            let questionsHtml = '';
            courseData.finalExam.forEach((q, qIdx) => {
                let optionsHtml = '';
                q.options.forEach((opt, oIdx) => {
                    optionsHtml += `
                        <label class="flex items-center p-4 border border-gray-200 rounded-lg cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition duration-150 mb-2">
                            <input type="radio" name="q${qIdx}" value="${oIdx}" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500 mr-4">
                            <span class="text-gray-700">${opt}</span>
                        </label>
                    `;
                });
                questionsHtml += `
                    <div class="bg-white p-8 rounded-xl shadow-md mb-8 border-l-4 border-blue-600 relative">
                        <span class="absolute top-4 right-4 text-gray-300 text-3xl font-bold opacity-20">#${qIdx + 1}</span>
                        <p class="font-bold text-gray-800 mb-6 text-lg flex items-start">
                            <span class="text-blue-600 mr-3 text-xl">${qIdx + 1}.</span> 
                            ${q.q}
                        </p>
                        <div class="space-y-1 pl-4 md:pl-8">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });

            div.innerHTML = `
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-bold text-gray-800">Evaluación Final</h2>
                    <p class="text-gray-500 mt-2">Responde todas las preguntas cuidadosamente.</p>
                </div>
                <form id="examForm" onsubmit="submitExam(event)">
                    ${questionsHtml}
                    <div class="text-center mt-12 mb-12">
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-16 rounded-full shadow-xl text-xl transition transform hover:scale-105 flex items-center mx-auto">
                            <i class="fas fa-check-circle mr-3"></i> Enviar Respuestas
                        </button>
                    </div>
                </form>
            `;
            app.appendChild(div);
        }

        function renderResult() {
            const passingScore = Math.ceil(courseData.finalExam.length * 0.7);
            const passed = state.score >= passingScore;
            const percentage = Math.round((state.score / courseData.finalExam.length) * 100);
            
            const div = document.createElement('div');
            div.className = 'fade-in text-center max-w-5xl mx-auto';

            if (passed) {
                const date = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
                div.innerHTML = `
                    <div class="bg-green-100 text-green-800 p-8 rounded-xl mb-10 shadow-md border border-green-200">
                        <div class="flex justify-center mb-4">
                            <div class="bg-green-200 rounded-full p-3">
                                <i class="fas fa-trophy text-4xl text-green-700"></i>
                            </div>
                        </div>
                        <h2 class="text-3xl font-bold mb-3">¡Felicidades, ${state.userName}!</h2>
                        <p class="text-xl">Has aprobado el curso satisfactoriamente.</p>
                        <div class="mt-4 flex justify-center gap-6 text-green-900 font-semibold">
                            <span><i class="fas fa-check mr-2"></i>Aciertos: ${state.score}/${courseData.finalExam.length}</span>
                            <span><i class="fas fa-chart-pie mr-2"></i>Nota: ${percentage}%</span>
                        </div>
                    </div>
                    <!-- Certificate Area -->
                    <div class="certificate-bg p-10 text-center text-gray-800 shadow-2xl mx-auto mb-10 max-w-4xl" id="certificate">
                        <div class="certificate-border p-10 flex flex-col items-center justify-center">
                            <div class="mb-8">
                                <i class="fas fa-award text-blue-600 text-6xl"></i>
                            </div>
                            <h1 class="text-5xl font-serif font-bold mb-4 text-blue-900 uppercase tracking-wider">Certificado de Aprobación</h1>
                            <p class="text-xl italic mb-8 text-gray-600">Por medio del presente se certifica que</p>
                            
                            <h2 class="text-4xl font-bold border-b-4 border-blue-900 pb-4 px-12 mb-8 inline-block font-serif">${state.userName}</h2>
                            
                            <p class="text-xl mb-4 text-gray-700">Ha completado y aprobado con éxito el programa de capacitación en:</p>
                            <h3 class="text-3xl font-bold text-blue-800 mb-12 uppercase tracking-wide">Manipulación Higiénica de Alimentos</h3>
                            
                            <div class="flex justify-around w-full mt-12">
                                <div class="text-center">
                                    <p class="font-bold text-xl text-gray-800">${date}</p>
                                    <div class="w-48 h-0.5 bg-gray-800 mx-auto mt-2"></div>
                                    <p class="text-sm text-gray-500 mt-2 font-semibold uppercase">Fecha de Emisión</p>
                                </div>
                                <div class="text-center">
                                    <div class="font-bold text-xl text-blue-900 italic font-serif">Multiservicios</div>
                                    <div class="w-48 h-0.5 bg-gray-800 mx-auto mt-2"></div>
                                    <p class="text-sm text-gray-500 mt-2 font-semibold uppercase">Entidad Certificadora</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center gap-4 mb-12 no-print">
                        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition flex items-center">
                            <i class="fas fa-print mr-3"></i> Imprimir / Guardar PDF
                        </button>
                        <button onclick="sendToWhatsApp()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition flex items-center">
                            <i class="fab fa-whatsapp mr-3 text-xl"></i> Enviar Resultado a RRHH
                        </button>
                        <button onclick="restartCourse()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition flex items-center">
                            <i class="fas fa-redo mr-3"></i> Reiniciar Curso
                        </button>
                    </div>
                    
                    <div class="text-center text-gray-400 text-sm no-print mb-8">
                        <p>Para guardar los datos en una base de datos real, este archivo necesita conectarse a un servidor.</p>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="bg-white p-10 rounded-xl shadow-lg max-w-2xl mx-auto text-center border-t-4 border-red-500">
                        <div class="mb-6 inline-block p-6 rounded-full bg-red-50">
                            <i class="fas fa-times-circle text-6xl text-red-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-4">No has aprobado</h2>
                        <div class="bg-red-50 p-6 rounded-lg mb-8">
                            <p class="text-gray-800 mb-2 text-xl font-semibold">Tu resultado: <span class="text-red-600">${percentage}%</span></p>
                            <p class="text-gray-600">Necesitas un mínimo de 70% para obtener el certificado.</p>
                            <p class="text-sm text-gray-500 mt-2">Respuestas correctas: ${state.score} / ${courseData.finalExam.length}</p>
                        </div>
                        
                        <button onclick="retryExam()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition transform hover:scale-105 flex items-center mx-auto text-lg">
                            <i class="fas fa-undo mr-3"></i> Intentar Examen Nuevamente
                        </button>
                        
                        <div class="mt-8 pt-6 border-t border-gray-100">
                            <p class="text-gray-500 mb-4">¿Sientes que necesitas repasar los videos?</p>
                            <button onclick="restartCourse()" class="text-blue-600 hover:text-blue-800 font-semibold hover:underline">
                                Volver al inicio del curso
                            </button>
                        </div>
                    </div>
                `;
            }
            app.appendChild(div);
        }

        // Logic Functions
        function startCourse() {
            const nameInput = document.getElementById('username');
            if (!nameInput.value.trim()) {
                alert('Por favor ingresa tu nombre completo para continuar.');
                nameInput.focus();
                return;
            }
            state.userName = nameInput.value;
            state.screen = 'module';
            render();
        }

        function goToQuiz() {
            state.screen = 'module-quiz';
            render();
        }

        function checkModuleAnswer(selectedIndex) {
            const module = courseData.modules[state.currentModuleIndex];
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            
            if (selectedIndex === module.quiz.correct) {
                feedback.innerHTML = `
                    <div class="bg-green-100 border-l-4 border-green-500 text-green-800 p-4 rounded shadow-sm mb-4" role="alert">
                        <p class="font-bold text-lg"><i class="fas fa-check-circle mr-2"></i>¡Correcto!</p>
                        <p>Has asimilado bien el concepto.</p>
                    </div>
                    <button onclick="nextModule()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition w-full flex justify-center items-center text-lg">
                        <span>Siguiente Módulo</span>
                        <i class="fas fa-arrow-right ml-3"></i>
                    </button>
                `;
            } else {
                feedback.innerHTML = `
                    <div class="bg-red-100 border-l-4 border-red-500 text-red-800 p-4 rounded shadow-sm" role="alert">
                        <p class="font-bold text-lg"><i class="fas fa-exclamation-circle mr-2"></i>Incorrecto</p>
                        <p>Intenta recordar lo visto en el video y selecciona otra opción.</p>
                    </div>
                `;
            }
        }

        function nextModule() {
            if (state.currentModuleIndex < courseData.modules.length - 1) {
                state.currentModuleIndex++;
                state.screen = 'module';
            } else {
                state.screen = 'exam-intro';
            }
            render();
        }

        function startExam() {
            state.screen = 'exam';
            render();
        }

        function submitExam(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            let score = 0;
            let answeredCount = 0;
            for (let pair of formData.entries()) {
                answeredCount++;
                const qIdx = parseInt(pair[0].replace('q', ''));
                const answer = parseInt(pair[1]);
                if (courseData.finalExam[qIdx].a === answer) {
                    score++;
                }
            }
            if (answeredCount < courseData.finalExam.length) {
                alert(`Has respondido ${answeredCount} de ${courseData.finalExam.length} preguntas. Por favor responde todas antes de enviar.`);
                return;
            }
            if (confirm("¿Estás seguro de que deseas enviar tus respuestas para calificación?")) {
                state.score = score;
                state.screen = 'result';
                render();
            }
        }

        function retryExam() {
            state.score = 0;
            state.screen = 'exam';
            render();
        }

        function skipToExam() {
            const nameInput = document.getElementById('username');
            if (!nameInput.value.trim()) {
                alert('Por favor ingresa tu nombre completo para continuar.');
                nameInput.focus();
                return;
            }
            state.userName = nameInput.value;
            if(confirm("¿Estás seguro? Irás directamente a la evaluación final sin ver los videos de repaso.")) {
                state.screen = 'exam-intro';
                render();
            }
        }

        function sendToWhatsApp() {
            const phoneNumber = ""; 
            const message = `Hola, soy *${state.userName}*. He completado el Curso de Manipulación de Alimentos Multiservicios.\n\nResultado: APROBADO ✅\nNota: ${state.score}/${courseData.finalExam.length}\nFecha: ${new Date().toLocaleDateString()}`;
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        function restartCourse() {
            if(confirm("¿Estás seguro de que quieres reiniciar todo el curso? Se perderá tu progreso actual.")){
                state.currentModuleIndex = 0;
                state.score = 0;
                state.screen = 'intro';
                render();
            }
        }

        // Init
        render();
    </script>
</body>
</html>
